services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  - type: web
    name: multi-agent-ai-travel-booking-system-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install uv && uv pip install --system -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lg_memory_travel_booking-system
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true

  # ── React Frontend (static site) ─────────────────────────────────────────
  - type: web
    name: multi-agent-ai-travel-booking-system-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true

databases:
  - name: lg_memory_travel_booking-system
    plan: free
    databaseName: lg_memory_travel_booking_system
    user: travelai