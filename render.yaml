services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  - type: web
    name: multi-agent ai travel booking system
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: travel-ai-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false          # set manually in Render dashboard
      - key: TAVILY_API_KEY
        sync: false
    healthCheckPath: /health
    autoDeploy: true

  # ── React Frontend (static site) ─────────────────────────────────────────
  - type: web
    name: multi-agent ai travel booking system frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # Set this to your backend URL after first deploy, e.g.:
        # https://travel-ai-backend.onrender.com
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true

databases:
  - name: travel-ai-db
    plan: free
    databaseName: travelai
    user: travelai